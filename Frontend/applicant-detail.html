<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applicant Details · Skill Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            colors: {
              primary: "#6b3df4",
              page: "#f8f7ff",
              ink: "#0f172a",
              "ink-muted": "#475569",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/chatbot.css">
</head>
  <body class="bg-page font-display text-ink min-h-screen">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white border-b border-gray-100 px-4 py-4 lg:px-8">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
          <a href="employer-dashboard.html" class="flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to Dashboard</span>
          </a>
          <a href="employer-dashboard.html" class="text-xl font-bold text-primary">Skill Bridge</a>
        </div>
      </header>

      <main class="flex-1 p-4 lg:p-8 max-w-4xl mx-auto w-full">
        <div id="loadingState" class="space-y-6">
          <div class="animate-pulse bg-white rounded-2xl p-8 border border-gray-100">
            <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-gray-100 rounded w-1/2"></div>
          </div>
        </div>

        <div id="applicantContent" class="hidden space-y-6">
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 lg:p-8 space-y-6">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-3">
                  <span id="applicationStatus" class="px-4 py-2 rounded-full text-sm font-semibold capitalize"></span>
                  <span class="text-sm text-ink-muted" id="appliedDate"></span>
                </div>
                <h1 id="workerName" class="text-3xl font-bold mb-3"></h1>
                <div class="flex flex-wrap items-center gap-4 text-sm text-ink-muted">
                  <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-base">email</span>
                    <span id="workerEmail"></span>
                  </span>
                  <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-base">account_circle</span>
                    <span id="workerUserName"></span>
                  </span>
                  <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-base">schedule</span>
                    <span id="workerAvailability" class="capitalize"></span>
                  </span>
                </div>
              </div>
              <div id="actionButtons" class="flex gap-2"></div>
            </div>

            <div class="border-t border-gray-100 pt-6">
              <h2 class="text-xl font-semibold mb-4">Applied For</h2>
              <div class="bg-gray-50 rounded-xl p-4">
                <h3 id="jobTitle" class="font-semibold text-lg mb-2"></h3>
                <p id="jobDescription" class="text-sm text-ink-muted mb-3"></p>
                <div class="flex items-center gap-4 text-sm">
                  <span class="text-ink-muted">Location:</span>
                  <span id="jobLocation" class="font-semibold"></span>
                  <span class="text-ink-muted">Pay:</span>
                  <span id="jobPay" class="font-semibold"></span>
                </div>
              </div>
            </div>

            <div class="border-t border-gray-100 pt-6">
              <h2 class="text-xl font-semibold mb-4">Cover Letter</h2>
              <div class="bg-gray-50 rounded-xl p-6">
                <p id="coverLetter" class="text-ink-muted whitespace-pre-wrap"></p>
              </div>
            </div>
          </div>
        </div>

        <div id="errorState" class="hidden bg-rose-50 border border-rose-200 rounded-2xl p-8 text-center">
          <span class="material-symbols-outlined text-6xl text-rose-500 mb-4">error</span>
          <h3 class="text-xl font-semibold text-rose-700 mb-2">Application Not Found</h3>
          <p class="text-rose-600 mb-6">The application you're looking for doesn't exist or you don't have access to it.</p>
          <a href="employer-dashboard.html" class="inline-flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Dashboard
          </a>
        </div>
      </main>
    </div>

    <script type="module" src="js/applicant-detail.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
