<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Details · Skill Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            colors: {
              primary: "#6b3df4",
              page: "#f8f7ff",
              ink: "#0f172a",
              "ink-muted": "#475569",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/chatbot.css">
</head>
  <body class="bg-page font-display text-ink min-h-screen">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white border-b border-gray-100 px-4 py-4 lg:px-8">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
          <a href="index.html" class="flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to Home</span>
          </a>
          <a href="index.html" class="text-xl font-bold text-primary">Skill Bridge</a>
        </div>
      </header>

      <main class="flex-1 p-4 lg:p-8 max-w-7xl mx-auto w-full">
        <div id="loadingState" class="space-y-6">
          <div class="animate-pulse bg-white rounded-2xl p-8 border border-gray-100">
            <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-gray-100 rounded w-1/2"></div>
          </div>
        </div>

        <div id="serviceContent" class="hidden space-y-6">
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 lg:p-8">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
              <div class="flex-1">
                <h1 id="serviceName" class="text-4xl font-bold mb-4"></h1>
                <p id="serviceDescription" class="text-lg text-ink-muted"></p>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 lg:p-8">
            <h2 class="text-2xl font-semibold mb-6">Available Jobs</h2>
            <div id="jobsContainer" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
              <p class="text-ink-muted">Loading jobs...</p>
            </div>
          </div>

          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 lg:p-8">
            <h2 class="text-2xl font-semibold mb-6">Available Workers</h2>
            <div id="workersContainer" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
              <p class="text-ink-muted">Loading workers...</p>
            </div>
          </div>
        </div>

        <div id="errorState" class="hidden bg-rose-50 border border-rose-200 rounded-2xl p-8 text-center">
          <span class="material-symbols-outlined text-6xl text-rose-500 mb-4">error</span>
          <h3 class="text-xl font-semibold text-rose-700 mb-2">Service Not Found</h3>
          <p class="text-rose-600 mb-6">The service you're looking for doesn't exist.</p>
          <a href="index.html" class="inline-flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Home
          </a>
        </div>
      </main>
    </div>

    <script type="module" src="js/service-detail.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
