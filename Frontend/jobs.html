<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Jobs · Skill Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            colors: {
              primary: "#6b3df4",
              page: "#f8f7ff",
              ink: "#0f172a",
              "ink-muted": "#475569",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/chatbot.css">
</head>
  <body class="bg-page font-display text-ink min-h-screen">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white border-b border-gray-100 px-4 py-4 lg:px-8">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
          <a href="worker-dashboard.html" class="flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Dashboard</span>
          </a>
          <a href="worker-dashboard.html" class="text-xl font-bold text-primary">Skill Bridge</a>
        </div>
      </header>

      <main class="flex-1 p-4 lg:p-8 max-w-7xl mx-auto w-full">
        <div class="mb-6">
          <h1 class="text-3xl font-bold mb-2">Browse Jobs</h1>
          <p class="text-ink-muted">Find opportunities that match your skills</p>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-6">
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="text"
              id="searchInput"
              placeholder="Search jobs..."
              class="flex-1 rounded-xl border-gray-200 px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent"
            />
            <select id="skillFilter" class="rounded-xl border-gray-200 px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent"><option value="all">All Skills</option></select> <select id="statusFilter"
              class="rounded-xl border-gray-200 px-4 py-2 focus:ring-2 focus:ring-primary focus:border-transparent"
            >
              <option value="open">Open Jobs</option>
              <option value="all">All Jobs</option>
            </select>
            <button
              id="searchBtn"
              class="px-6 py-2 bg-primary text-white rounded-xl font-semibold hover:bg-primary/90"
            >
              Search
            </button>
          </div>
        </div>

        <div id="jobsContainer" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
          <div class="animate-pulse bg-white rounded-2xl p-6 border border-gray-100">
            <div class="h-6 bg-gray-200 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-gray-100 rounded w-1/2"></div>
          </div>
        </div>

        <div id="emptyState" class="hidden text-center py-12">
          <span class="material-symbols-outlined text-6xl text-gray-300 mb-4">work_off</span>
          <h3 class="text-xl font-semibold text-ink-muted mb-2">No jobs found</h3>
          <p class="text-ink-muted">Try adjusting your search criteria</p>
        </div>
      </main>
    </div>

    <script src="js/skills-data.js"></script>`n    <script type="module" src="js/jobs.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
