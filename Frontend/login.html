<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Skill Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#7f13ec",
            "background-light": "#f7f6f8",
            "background-dark": "#191022",
          },
          fontFamily: {
            display: ["Manrope"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/chatbot.css">
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">
  <div class="relative flex min-h-screen flex-col overflow-x-hidden">
    <!-- Header -->
    <header class="sticky top-0 z-20 border-b border-slate-200/70 bg-background-light/90 dark:border-slate-800/70 dark:bg-background-dark/80 backdrop-blur">
      <div class="container mx-auto flex h-16 items-center justify-between px-4 lg:px-10">
        <a href="index.html" class="flex items-center gap-3">
          <svg class="h-8 w-8 text-primary" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 42.4379C4 42.4379 14.0962 36.0744 24 41.1692C35.0664 46.8624 44 42.2078 44 42.2078L44 7.01134C44 7.01134 35.068 11.6577 24.0031 5.96913C14.0971 0.876274 4 7.27094 4 7.27094L4 42.4379Z" fill="currentColor"></path>
          </svg>
          <div>
            <p class="text-xs uppercase tracking-widest text-primary">Skill Bridge</p>
            <p class="text-sm font-semibold text-slate-900 dark:text-white">Trusted home pros</p>
          </div>
        </a>
        <div class="flex items-center gap-3">
          <a href="register.html" class="hidden sm:inline-flex rounded-full border border-slate-300/70 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800/70">
            Sign Up
          </a>
          <a href="index.html" class="inline-flex items-center gap-2 rounded-full bg-primary px-4 py-2 text-sm font-bold text-white shadow-lg shadow-primary/30 transition hover:bg-primary/90">
            <span class="material-symbols-outlined text-base">home</span>
            <span class="hidden sm:inline">Home</span>
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1">
      <div class="container mx-auto px-4 py-8 lg:px-10 lg:py-12">
        <div class="mx-auto max-w-md">
          <!-- Login Card -->
          <div class="rounded-3xl border border-slate-200/80 bg-white p-8 shadow-2xl dark:border-slate-800 dark:bg-slate-900/90">
            <!-- Header -->
            <div class="mb-8 text-center">
              <div class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-primary/10">
                <span class="material-symbols-outlined text-3xl text-primary">login</span>
              </div>
              <h1 class="text-3xl font-black text-slate-900 dark:text-white">Welcome Back</h1>
              <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                Log in to continue to Skill Bridge
              </p>
            </div>

            <!-- Form -->
            <form action="#" class="space-y-6" method="POST" id="loginForm">
              <!-- Email Input -->
              <div>
                <label for="email-address" class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">
                  Email Address
                </label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">email</span>
                  <input
                    autocomplete="email"
                    type="email"
                    id="email-address"
                    name="email"
                    required
                    placeholder="you@example.com"
                    class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 py-3 pl-10 pr-4 text-sm text-slate-900 placeholder-slate-400 transition focus:border-primary focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500 dark:focus:border-primary"
                  />
                </div>
              </div>

              <!-- Password Input -->
              <div>
                <label for="password" class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">
                  Password
                </label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                  <input
                    autocomplete="current-password"
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="Enter your password"
                    class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 py-3 pl-10 pr-4 text-sm text-slate-900 placeholder-slate-400 transition focus:border-primary focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500 dark:focus:border-primary"
                  />
                </div>
              </div>

              <!-- Remember Me & Forgot Password -->
              <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" id="remember-me" name="remember-me" class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary dark:border-slate-600" />
                  <span class="text-sm text-slate-600 dark:text-slate-400">Remember me</span>
                </label>
                <a href="#" class="text-sm font-semibold text-primary hover:text-primary/80 transition">
                  Forgot password?
                </a>
              </div>

              <!-- Submit Button -->
              <button
                type="submit"
                class="w-full rounded-xl bg-primary py-3.5 px-4 text-sm font-bold text-white shadow-lg shadow-primary/30 transition hover:bg-primary/90 hover:shadow-primary/50 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
              >
                Log In
              </button>
            </form>

            <!-- Divider -->
            <div class="my-8 flex items-center gap-4">
              <div class="flex-1 border-t border-slate-200 dark:border-slate-700"></div>
              <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Or</span>
              <div class="flex-1 border-t border-slate-200 dark:border-slate-700"></div>
            </div>

            <!-- Sign Up Link -->
            <div class="text-center">
              <p class="text-sm text-slate-600 dark:text-slate-400">
                Don't have an account?
                <a href="register.html" class="font-bold text-primary hover:text-primary/80 transition">
                  Sign up for free
                </a>
              </p>
            </div>
          </div>

          <!-- Additional Info -->
          <div class="mt-6 text-center">
            <p class="text-xs text-slate-500 dark:text-slate-400">
              By logging in, you agree to our
              <a href="#" class="text-primary hover:underline">Terms of Service</a>
              and
              <a href="#" class="text-primary hover:underline">Privacy Policy</a>
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/skills-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
