<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Management · Skill Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            colors: {
              primary: "#6b3df4",
              page: "#f8f7ff",
              ink: "#0f172a",
              "ink-muted": "#475569",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/chatbot.css">
</head>
  <body class="bg-page font-display text-ink min-h-screen">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white border-b border-gray-100 px-4 py-4 lg:px-8">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
          <a href="employer-dashboard.html" class="flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Back to Dashboard</span>
          </a>
          <a href="employer-dashboard.html" class="text-xl font-bold text-primary">Skill Bridge</a>
        </div>
      </header>

      <main class="flex-1 p-4 lg:p-8 max-w-7xl mx-auto w-full">
        <div id="loadingState" class="space-y-6">
          <div class="animate-pulse bg-white rounded-2xl p-8 border border-gray-100">
            <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-gray-100 rounded w-1/2"></div>
          </div>
        </div>

        <div id="jobContent" class="hidden space-y-6">
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 lg:p-8 space-y-6">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-3">
                  <span id="jobStatus" class="px-3 py-1 rounded-full text-xs font-semibold capitalize"></span>
                  <span class="text-sm text-ink-muted" id="jobCategory"></span>
                </div>
                <h1 id="jobTitle" class="text-3xl font-bold mb-3"></h1>
                <div class="flex flex-wrap items-center gap-4 text-sm text-ink-muted">
                  <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-base">location_on</span>
                    <span id="jobLocation"></span>
                  </span>
                  <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-base">payments</span>
                    <span id="jobPay" class="font-semibold text-ink"></span>
                  </span>
                  <span class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-base">people</span>
                    <span id="applicantCount" class="font-semibold text-ink"></span>
                  </span>
                </div>
              </div>
              <div class="flex gap-2">
                <button id="editJobBtn" class="px-4 py-2 border border-gray-200 rounded-xl font-semibold hover:bg-gray-50 transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary">Edit Job</button>
                <button id="deleteJobBtn" class="px-4 py-2 bg-rose-500 text-white rounded-xl font-semibold hover:bg-rose-600 transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary">Delete</button>
              </div>
            </div>

            <div id="jobSkills" class="flex flex-wrap gap-2"></div>

            <div class="border-t border-gray-100 pt-6">
              <h2 class="text-xl font-semibold mb-4">Job Description</h2>
              <div id="jobDescription" class="prose prose-sm max-w-none text-ink-muted whitespace-pre-wrap"></div>
            </div>

            <div id="assignedWorkerSection" class="border-t border-gray-100 pt-6 hidden">
              <h2 class="text-xl font-semibold mb-4">Assigned Worker</h2>
              <div class="bg-emerald-50 rounded-xl p-4">
                <p class="font-semibold text-emerald-700" id="assignedWorkerName"></p>
                <p class="text-sm text-emerald-600" id="assignedWorkerEmail"></p>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 lg:p-8">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h2 class="text-2xl font-semibold">Applicants</h2>
                <p class="text-sm text-ink-muted" id="applicantCountText"></p>
              </div>
              <button id="refreshApplicants" class="text-sm text-primary font-semibold">
                Refresh
              </button>
            </div>

            <div id="applicantsContainer" class="space-y-4">
              <p class="text-ink-muted text-center py-8">Loading applicants...</p>
            </div>
          </div>
        </div>

        <div id="errorState" class="hidden bg-rose-50 border border-rose-200 rounded-2xl p-8 text-center">
          <span class="material-symbols-outlined text-6xl text-rose-500 mb-4">error</span>
          <h3 class="text-xl font-semibold text-rose-700 mb-2">Job Not Found</h3>
          <p class="text-rose-600 mb-6">The job you're looking for doesn't exist or you don't have access to it.</p>
          <a href="employer-dashboard.html" class="inline-flex items-center gap-2 text-primary font-semibold">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Dashboard
          </a>
        </div>
      </main>
    </div>

    <script type="module" src="js/job-management.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
